name: Publish Release

on:
  push:
    tags:
      - 'app-*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 25
      - uses: pnpm/action-setup@v5
        with:
          version: 10
      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
